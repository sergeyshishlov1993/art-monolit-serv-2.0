version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: monuments-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: monuments
      POSTGRES_PASSWORD: monuments_secret
      POSTGRES_DB: monuments
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: monuments-redis
    restart: unless-stopped
    command: redis-server --requirepass redis_secret
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  minio:
    image: quay.io/minio/minio:latest
    container_name: monuments-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  minio-init:
    image: quay.io/minio/mc:latest
    container_name: monuments-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin123;
      mc mb local/monuments-public --ignore-existing;
      mc anonymous set public local/monuments-public;
      exit 0;
      "

  backend:
    image: node:20-alpine
    container_name: monuments-backend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - '4000:4000'
    env_file:
      - .env
    command: sh -c "npm install && npx prisma generate && npm run start:dev"
    depends_on:
      - postgres
      - redis
      - minio

volumes:
  postgres_data:
  redis_data:
  minio_data: